<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitFuel Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins", sans-serif;
}

body{
background:linear-gradient(135deg,#ffdde1,#ee9ca7);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{width:100%;max-width:900px}

/* CARDS */
.card{
background:rgba(255,255,255,0.25);
backdrop-filter:blur(12px);
border-radius:20px;
padding:25px;
margin-top:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

/* TITLE */
h1{
text-align:center;
color:white;
font-size:3rem;
}

/* BUTTONS */
.btn{
padding:15px;
border:none;
border-radius:15px;
cursor:pointer;
font-weight:600;
transition:0.3s;
background:white;
}

.btn:hover{
transform:scale(1.05);
}

/* GRID */
.grid{
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
}

/* HIDDEN */
.hidden{display:none}

/* RECIPE CARD */
.recipe{
display:flex;
gap:15px;
align-items:center;
background:white;
padding:10px;
border-radius:15px;
margin-top:10px;
}

.recipe img{
width:80px;
height:80px;
border-radius:12px;
object-fit:cover;
}

/* PAY SCREEN */
.pay{
text-align:center;
color:white;
}

.plan{
background:white;
padding:15px;
border-radius:15px;
margin:10px;
cursor:pointer;
transition:0.3s;
}

.plan:hover{transform:scale(1.05)}
</style>
</head>

<body>

<div class="container">

<h1>🍓 FitFuel Premium</h1>

<!-- PAYWALL -->
<div class="card" id="paywall">

<h2 class="pay">Choose Plan to Continue</h2>

<div class="plan" onclick="unlock()">
💳 Weekly — €2.99
</div>

<div class="plan" onclick="unlock()">
💳 Monthly — €8.99
</div>

<div class="plan" onclick="unlock()">
💳 Yearly — €25.99
</div>

</div>

<!-- APP -->
<div class="card hidden" id="app">

<h2>What do you want?</h2>

<div class="grid">
<button class="btn" onclick="setType('Snack')">🍿 Snack</button>
<button class="btn" onclick="setType('Drink')">🥤 Drink</button>
<button class="btn" onclick="setType('Dessert')">🍰 Dessert</button>
</div>

</div>

<!-- GOALS -->
<div class="card hidden" id="goalBox">

<h2>Choose Goal</h2>

<div class="grid">
<button class="btn" onclick="setGoal('low')">💪 Low Cal + High Protein</button>
<button class="btn" onclick="setGoal('high')">🔥 High Cal + High Protein</button>
<button class="btn" onclick="setGoal('cheat')">😋 Cheat Day</button>
</div>

</div>

<!-- RECIPES -->
<div class="card hidden" id="recipesBox">
<h2 id="title"></h2>
<div id="recipes"></div>
</div>

</div>

<script>

// STATE
let type="";
let goal="";

// UNLOCK
function unlock(){
document.getElementById("paywall").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
}

// STEP 1
function setType(t){
type=t;
document.getElementById("goalBox").classList.remove("hidden");
}

// STEP 2
function setGoal(g){
goal=g;
document.getElementById("recipesBox").classList.remove("hidden");
generate();
}

// REALISTIC RECIPE DATABASE
const baseNames = {
Snack:["Protein Cookie","Greek Yogurt Bowl","Peanut Butter Toast","Berry Crunch Cup","Oat Bite"],
Drink:["Protein Shake","Banana Smoothie","Chocolate Milk Fit","Strawberry Boost","Vanilla Energy"],
Dessert:["Protein Brownie","Fit Cheesecake","Choco Mug Cake","Greek Yogurt Ice Cream","Healthy Donut"]
};

const images=[
"https://images.unsplash.com/photo-1505253213348-1f3f6b3f5f9c",
"https://images.unsplash.com/photo-1504674900247-0877df9cc836",
"https://images.unsplash.com/photo-1512621776951-a57141f2eefd",
"https://images.unsplash.com/photo-1484723091739-30a097e8f929",
"https://images.unsplash.com/photo-1490645935967-10de6ba17061"
];

// GENERATE 30 RECIPES PER CATEGORY
function generate(){
let box=document.getElementById("recipes");
box.innerHTML="";

document.getElementById("title").innerText=
type+" • "+goal.toUpperCase();

for(let i=0;i<30;i++){

let name =
"✨ "+baseNames[type][i%5]+" #"+(i+1);

let cal =
goal==="low"?Math.floor(Math.random()*150)+120:
goal==="high"?Math.floor(Math.random()*400)+400:
Math.floor(Math.random()*300)+250;

let protein =
goal==="low"?Math.floor(Math.random()*20)+15:
goal==="high"?Math.floor(Math.random()*30)+25:
Math.floor(Math.random()*15)+10;

let div=document.createElement("div");
div.className="recipe";

div.innerHTML=`
<img src="${images[i%images.length]}">
<div>
<b>${name}</b><br>
<small>🔥 ${cal} kcal | 💪 ${protein}g protein</small>
</div>
`;

box.appendChild(div);
}

}

</script>

</body>
</html>
