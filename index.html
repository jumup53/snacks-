<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitFuel Recipes</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#fdfbfb,#ebedee);
min-height:100vh;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
text-align:center;
font-size:3rem;
color:#ff4d6d;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:30px;
font-size:1.1rem;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
margin-bottom:25px;
}

.question{
font-size:1.4rem;
margin-bottom:20px;
font-weight:600;
}

.options{
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;
}

button{
padding:15px 25px;
border:none;
border-radius:15px;
background:#ff4d6d;
color:white;
font-size:1rem;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
background:#ff1f4b;
}

.hidden{
display:none;
}

.recipe-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.recipe-card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
transition:.3s;
}

.recipe-card:hover{
transform:translateY(-8px);
}

.recipe-card img{
width:100%;
height:200px;
object-fit:cover;
}

.recipe-content{
padding:15px;
}

.recipe-content h3{
color:#ff4d6d;
margin-bottom:10px;
}

.recipe-content p{
color:#555;
font-size:.95rem;
line-height:1.4;
}

.badge{
display:inline-block;
background:#ffe0e7;
color:#ff4d6d;
padding:5px 10px;
border-radius:20px;
font-size:.8rem;
margin-bottom:10px;
}

#recipesTitle{
text-align:center;
margin-top:20px;
font-size:2rem;
color:#333;
}
</style>
</head>

<body>

<div class="container">

<h1>🍓 FitFuel Recipes</h1>
<p class="subtitle">Healthy, High Protein & Delicious Ideas for Teens</p>

<div class="card" id="step1">
<div class="question">What are you craving today?</div>

<div class="options">
<button onclick="selectType('Snack')">🍿 Snack</button>
<button onclick="selectType('Drink')">🥤 Drink</button>
<button onclick="selectType('Dessert')">🍰 Dessert</button>
</div>
</div>

<div class="card hidden" id="step2">
<div class="question">Choose your vibe:</div>

<div class="options">
<button onclick="generateRecipes('Low Calorie + High Protein')">💪 Low Cal + High Protein</button>

<button onclick="generateRecipes('High Calorie + High Protein')">🔥 High Cal + High Protein</button>

<button onclick="generateRecipes('Cheat Day')">😋 Normal / Cheat Day</button>
</div>
</div>

<h2 id="recipesTitle"></h2>

<div class="recipe-grid" id="recipes"></div>

</div>

<script>

let selectedType = "";

function selectType(type){
selectedType = type;
document.getElementById("step2").classList.remove("hidden");
window.scrollTo({
top:300,
behavior:"smooth"
});
}

const funnyNames = [
"Protein Power Punch",
"Buff Banana Bliss",
"Muscle Fuel Magic",
"Snackzilla Supreme",
"Gain Train Delight",
"Fit Freak Fantasy",
"Peanut Butter Beast",
"Chocolate Hulk Bowl",
"Captain Crunch Gains",
"Berry Strong Shake",
"Greek God Treat",
"Cookie Monster Protein",
"Lean Mean Dream",
"Protein Party Bomb",
"Unicorn Fuel Bowl",
"Flex Fuel Feast",
"Cheat Code Delight",
"Power Puff Protein",
"Abs Factory Special",
"Legendary Energy Bite"
];

const images = [
"https://images.unsplash.com/photo-1490645935967-10de6ba17061",
"https://images.unsplash.com/photo-1547592180-85f173990554",
"https://images.unsplash.com/photo-1502741338009-cac2772e18bc",
"https://images.unsplash.com/photo-1512621776951-a57141f2eefd",
"https://images.unsplash.com/photo-1498837167922-ddd27525d352",
"https://images.unsplash.com/photo-1482049016688-2d3e1b311543",
"https://images.unsplash.com/photo-1484723091739-30a097e8f929",
"https://images.unsplash.com/photo-1504674900247-0877df9cc836",
"https://images.unsplash.com/photo-1473093295043-cdd812d0e601",
"https://images.unsplash.com/photo-1540189549336-e6e99c3679fe"
];

function generateRecipes(goal){

let container = document.getElementById("recipes");
container.innerHTML = "";

document.getElementById("recipesTitle").innerHTML =
selectedType + " • " + goal;

for(let i=0;i<20;i++){

let card = document.createElement("div");
card.className = "recipe-card";

let image = images[i % images.length];

let recipeText = "";

if(selectedType === "Snack"){

recipeText =
goal === "Low Calorie + High Protein"
?
"Greek yogurt, berries, protein powder and almonds. Around 20g protein."
:
goal === "High Calorie + High Protein"
?
"Peanut butter oats, banana and protein powder. Great for bulking."
:
"Chocolate chips, peanut butter and oats for a fun cheat-day snack.";

}

if(selectedType === "Drink"){

recipeText =
goal === "Low Calorie + High Protein"
?
"Protein shake with almond milk, ice and strawberries."
:
goal === "High Calorie + High Protein"
?
"Mass-gainer smoothie with oats, banana, milk and peanut butter."
:
"Cookies-and-cream milkshake loaded with deliciousness.";

}

if(selectedType === "Dessert"){

recipeText =
goal === "Low Calorie + High Protein"
?
"Protein mug cake made with yogurt and vanilla protein."
:
goal === "High Calorie + High Protein"
?
"Peanut butter protein cheesecake packed with calories and protein."
:
"Brownie sundae with ice cream and chocolate drizzle.";

}

card.innerHTML = `
<img src="${image}?w=800" alt="food">
<div class="recipe-content">
<div class="badge">${goal}</div>
<h3>${funnyNames[i]}</h3>
<p>${recipeText}</p>
</div>
`;

container.appendChild(card);

}

window.scrollTo({
top:500,
behavior:"smooth"
});

}

</script>

</body>
</html>
