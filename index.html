<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitFuel Pro 🍓</title>

<style>
:root{
  --bg:#f7f7fb;
  --card:#ffffff;
  --text:#1e1e1e;
  --accent:#ff3d6e;
  --muted:#666;
}

body.dark{
  --bg:#0f1115;
  --card:#1b1f2a;
  --text:#ffffff;
  --accent:#ff4d7d;
  --muted:#aaa;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
  overflow-x:hidden;
}

/* HEADER */
header{
  text-align:center;
  padding:25px;
  font-size:2.5rem;
  font-weight:bold;
  color:var(--accent);
}

/* SUBTITLE */
.subtitle{
  text-align:center;
  color:var(--muted);
  margin-top:-10px;
}

/* BUTTONS */
.btn{
  background:var(--accent);
  border:none;
  padding:12px 18px;
  color:white;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
  font-size:1rem;
}

.btn:hover{
  transform:scale(1.05);
}

/* LAYOUT */
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* CARDS */
.card{
  background:var(--card);
  padding:20px;
  border-radius:18px;
  margin-top:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

/* OPTIONS GRID */
.grid{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  justify-content:center;
}

/* BIG OPTION BUTTONS */
.option{
  flex:1;
  min-width:200px;
  padding:20px;
  text-align:center;
  background:var(--card);
  border:2px solid transparent;
  border-radius:16px;
  cursor:pointer;
  transition:0.3s;
}

.option:hover{
  border:2px solid var(--accent);
  transform:translateY(-5px);
}

/* HIDDEN */
.hidden{
  display:none;
}

/* RECIPE GRID */
#recipes{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-top:20px;
}

/* RECIPE CARD */
.recipe{
  background:var(--card);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 6px 20px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:0.3s;
}

.recipe:hover{
  transform:scale(1.03);
}

.recipe img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.recipe-content{
  padding:12px;
}

.badge{
  font-size:0.75rem;
  padding:5px 10px;
  background:var(--accent);
  color:white;
  border-radius:20px;
  display:inline-block;
}

/* DARK MODE BUTTON */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
}

.toggle{
  background:none;
  border:2px solid var(--accent);
  color:var(--text);
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
}

/* FLOATING ANIMATION */
.floating{
  position:fixed;
  font-size:20px;
  opacity:0.2;
  animation:float 10s infinite linear;
}

@keyframes float{
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<header>🍓 FitFuel Pro</header>
<p class="subtitle">Healthy • High Protein • Teen Friendly Recipes</p>

<div class="topbar">
  <div></div>
  <button class="toggle" onclick="toggleDark()">🌙 Dark Mode</button>
</div>

<div class="container">

<!-- STEP 1 -->
<div class="card" id="step1">
  <h2>What do you want?</h2>
  <div class="grid">
    <div class="option" onclick="selectType('Snack')">🍿 Snack</div>
    <div class="option" onclick="selectType('Drink')">🥤 Drink</div>
    <div class="option" onclick="selectType('Dessert')">🍰 Dessert</div>
  </div>
</div>

<!-- STEP 2 -->
<div class="card hidden" id="step2">
  <h2>Choose your goal</h2>
  <div class="grid">
    <div class="option" onclick="selectGoal('low')">💪 Low Cal + High Protein</div>
    <div class="option" onclick="selectGoal('bulk')">🔥 High Cal + High Protein</div>
    <div class="option" onclick="selectGoal('cheat')">😋 Cheat Day</div>
  </div>
</div>

<!-- RECIPES -->
<div id="recipes"></div>

</div>

<script>
// STATE
let type = "";
let goal = "";

// DARK MODE
function toggleDark(){
  document.body.classList.toggle("dark");
}

// STEP 1
function selectType(t){
  type = t;
  document.getElementById("step2").classList.remove("hidden");
  window.scrollTo({top:300, behavior:"smooth"});
}

// STEP 2 (placeholder — logic in Part 2)
function selectGoal(g){
  goal = g;
  generateRecipes();
}

// FLOATING ICONS
const emojis = ["🍓","🥑","🍌","🍫","🥤","🍪"];
for(let i=0;i<10;i++){
  let el = document.createElement("div");
  el.className = "floating";
  el.innerText = emojis[Math.floor(Math.random()*emojis.length)];
  el.style.left = Math.random()*100 + "vw";
  el.style.animationDuration = (5+Math.random()*10)+"s";
  document.body.appendChild(el);
}
</script>

</body>
</html>
<script>
// ===============================
// GLOBAL STATE (from Part 1)
// ===============================
let type = "";
let goal = "";

// ===============================
// FUNNY NAME GENERATOR POOL
// ===============================
const names = [
"Protein Power Bomb","Muscle Milk Madness","Snackzilla Supreme","Banana Gains Brew",
"Abs Builder Bite","Cheat Code Cookie","Greek God Fuel","Strawberry Flex Shake",
"Oat Beast Bowl","Peanut Power Punch","Gym Rat Delight","Shredded Smoothie",
"Dream Bulk Dessert","Healthy Chaos Cup","Midnight Protein Magic","Lean Machine Snack",
"Choco Gain Storm","Fitness Fairy Bowl","Beast Mode Bites","Whey Wonderland"
];

// ===============================
// IMAGE POOL (Unsplash food themes)
// ===============================
const images = [
"https://images.unsplash.com/photo-1505253213348-1f3f6b3f5f9c",
"https://images.unsplash.com/photo-1512621776951-a57141f2eefd",
"https://images.unsplash.com/photo-1546069901-ba9599a7e63c",
"https://images.unsplash.com/photo-1551024601-bec78aea704b",
"https://images.unsplash.com/photo-1490645935967-10de6ba17061",
"https://images.unsplash.com/photo-1504674900247-0877df9cc836",
"https://images.unsplash.com/photo-1476224203421-9ac39bcb3327",
"https://images.unsplash.com/photo-1484723091739-30a097e8f929"
];

// ===============================
// RECIPE DATABASE GENERATOR
// (creates 100+ variations dynamically)
// ===============================
function createRecipe(i){
  let baseCalories =
    goal === "low" ? Math.floor(Math.random()*150)+120 :
    goal === "bulk" ? Math.floor(Math.random()*400)+400 :
    Math.floor(Math.random()*300)+250;

  let protein =
    goal === "low" ? Math.floor(Math.random()*20)+15 :
    goal === "bulk" ? Math.floor(Math.random()*30)+25 :
    Math.floor(Math.random()*15)+10;

  let carbs = Math.floor(Math.random()*60)+20;
  let fats = Math.floor(Math.random()*25)+5;

  let desc = "";

  if(type === "Snack"){
    desc = "Crunchy, quick and perfect between meals.";
  } 
  else if(type === "Drink"){
    desc = "Smooth, refreshing protein-packed drink.";
  } 
  else {
    desc = "Sweet dessert with balanced macros.";
  }

  if(goal === "low"){
    desc += " Low calorie but high protein for lean gains.";
  } 
  else if(goal === "bulk"){
    desc += " High calorie fuel for muscle building.";
  } 
  else {
    desc += " Cheat day friendly indulgence.";
  }

  return {
    name: names[i % names.length] + " #" + (i+1),
    calories: baseCalories,
    protein: protein,
    carbs: carbs,
    fats: fats,
    desc: desc,
    img: images[i % images.length]
  };
}

// ===============================
// GENERATE RECIPES
// ===============================
function generateRecipes(){
  let container = document.getElementById("recipes");
  container.innerHTML = "";

  for(let i=0;i<100;i++){
    let r = createRecipe(i);

    let div = document.createElement("div");
    div.className = "recipe";

    div.innerHTML = `
      <img src="${r.img}" />
      <div class="recipe-content">
        <span class="badge">${goal.toUpperCase()}</span>
        <h3>${r.name}</h3>
        <p>${r.desc}</p>
        <small>
          🔥 ${r.calories} kcal | 💪 ${r.protein}g protein
        </small>
      </div>
    `;

    container.appendChild(div);
  }

  window.scrollTo({top:500, behavior:"smooth"});
}
</script>
<script>
// ===============================
// SEARCH + FAVORITES STATE
// ===============================
let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

// ===============================
// ADD SEARCH BAR UI
// ===============================
const searchBar = document.createElement("input");
searchBar.placeholder = "🔎 Search recipes...";
searchBar.style.width = "100%";
searchBar.style.padding = "12px";
searchBar.style.marginTop = "20px";
searchBar.style.borderRadius = "12px";
searchBar.style.border = "1px solid #ccc";

document.querySelector(".container").prepend(searchBar);

searchBar.addEventListener("input", filterRecipes);

// ===============================
// FILTER FUNCTION
// ===============================
function filterRecipes(){
  let query = searchBar.value.toLowerCase();
  document.querySelectorAll(".recipe").forEach(card => {
    let text = card.innerText.toLowerCase();
    card.style.display = text.includes(query) ? "block" : "none";
  });
}

// ===============================
// FAVORITE TOGGLE
// ===============================
function toggleFavorite(recipe){
  let index = favorites.findIndex(f => f.name === recipe.name);

  if(index > -1){
    favorites.splice(index,1);
  } else {
    favorites.push(recipe);
  }

  localStorage.setItem("favorites", JSON.stringify(favorites));
  renderFavorites();
}

// ===============================
// FAVORITES SECTION
// ===============================
const favSection = document.createElement("div");
favSection.className = "card";
favSection.innerHTML = "<h2>⭐ Favorites</h2><div id='favList'></div>";
document.querySelector(".container").appendChild(favSection);

function renderFavorites(){
  let list = document.getElementById("favList");
  list.innerHTML = "";

  favorites.forEach(f => {
    let div = document.createElement("div");
    div.style.padding = "10px";
    div.style.borderBottom = "1px solid #ddd";
    div.innerHTML = `🍓 ${f.name} - ${f.calories} kcal`;
    list.appendChild(div);
  });
}

// ===============================
// MODAL POPUP
// ===============================
const modal = document.createElement("div");
modal.style.position = "fixed";
modal.style.top = "0";
modal.style.left = "0";
modal.style.width = "100%";
modal.style.height = "100%";
modal.style.background = "rgba(0,0,0,0.6)";
modal.style.display = "none";
modal.style.justifyContent = "center";
modal.style.alignItems = "center";
modal.style.zIndex = "9999";

modal.innerHTML = `
<div id="modalBox" style="
background:white;
padding:20px;
border-radius:15px;
max-width:400px;
text-align:center;
">
</div>
`;

document.body.appendChild(modal);

// ===============================
// SHOW MODAL
// ===============================
function showRecipe(recipe){
  document.getElementById("modalBox").innerHTML = `
    <h2>${recipe.name}</h2>
    <p>${recipe.desc}</p>
    <hr>
    <p>🔥 Calories: ${recipe.calories}</p>
    <p>💪 Protein: ${recipe.protein}g</p>
    <p>🍞 Carbs: ${recipe.carbs}g</p>
    <p>🧈 Fats: ${recipe.fats}g</p>
    <br>
    <button onclick='toggleFavorite(${JSON.stringify(recipe)})'>⭐ Save Favorite</button>
    <br><br>
    <button onclick="closeModal()">Close</button>
  `;

  modal.style.display = "flex";
}

// ===============================
// CLOSE MODAL
// ===============================
function closeModal(){
  modal.style.display = "none";
}

// ===============================
// UPDATE generateRecipes() CLICK LOGIC
// ===============================
// (override Part 2 cards to include click event)

const oldGenerate = generateRecipes;

generateRecipes = function(){
  let container = document.getElementById("recipes");
  container.innerHTML = "";

  for(let i=0;i<100;i++){
    let r = createRecipe(i);

    let div = document.createElement("div");
    div.className = "recipe";

    div.onclick = () => showRecipe(r);

    div.innerHTML = `
      <img src="${r.img}" />
      <div class="recipe-content">
        <span class="badge">${goal.toUpperCase()}</span>
        <h3>${r.name}</h3>
        <p>${r.desc}</p>
        <small>🔥 ${r.calories} kcal | 💪 ${r.protein}g</small>
      </div>
    `;

    container.appendChild(div);
  }

  window.scrollTo({top:500, behavior:"smooth"});
};

// ===============================
// INIT
// ===============================
renderFavorites();

</script>
